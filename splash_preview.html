<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Splash Preview — BB Inventor Pro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #080808;
    font-family: "Segoe UI", "Inter", sans-serif;
    color: #f0f0f0;
    user-select: none;
  }

  #canvas { position: fixed; inset: 0; z-index: 0; }

  .splash {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .logo-wrap {
    width: 96px; height: 96px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(29,185,84,.22), rgba(29,185,84,.06));
    border: 1px solid rgba(29,185,84,.35);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 0 40px rgba(29,185,84,.18), 0 16px 48px rgba(0,0,0,.5);
    animation: logoIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
  }
  .logo-letters {
    font-size: 2.2rem; font-weight: 900;
    letter-spacing: -0.05em; color: #1db954;
    text-shadow: 0 0 20px rgba(29,185,84,.5);
  }

  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.6) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .app-name {
    font-size: 2rem; font-weight: 900; letter-spacing: -0.05em;
    animation: fadeUp 0.6s 0.35s ease forwards; opacity: 0;
  }
  .app-name span { color: #1db954; }

  .app-sub {
    font-size: 0.82rem; color: #555; margin-top: 8px;
    letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600;
    animation: fadeUp 0.6s 0.5s ease forwards; opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .progress-wrap {
    margin-top: 48px; width: 200px;
    animation: fadeUp 0.5s 0.7s ease forwards; opacity: 0;
  }
  .progress-track {
    width: 100%; height: 3px;
    background: rgba(255,255,255,.07);
    border-radius: 999px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #1db954, #56ffae);
    border-radius: 999px;
    transition: width 0.4s ease;
    box-shadow: 0 0 10px rgba(29,185,84,.5);
  }
  .progress-label {
    margin-top: 12px; font-size: 0.72rem; color: #444;
    text-align: center; letter-spacing: 0.08em; height: 16px;
    transition: all 0.3s;
  }

  .version {
    position: fixed; bottom: 20px; right: 24px;
    font-size: 0.7rem; color: #2a2a2a; letter-spacing: 0.06em;
    animation: fadeUp 0.5s 1s ease forwards; opacity: 0;
  }

  /* replay button */
  .replay {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    color: #555; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
    padding: 6px 16px; border-radius: 999px; cursor: pointer;
    transition: all .2s; z-index: 10;
    animation: fadeUp 0.5s 1.2s ease forwards; opacity: 0;
  }
  .replay:hover { background: rgba(255,255,255,.1); color: #888; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="splash">
  <div class="logo-wrap">
    <div class="logo-letters">BB</div>
  </div>
  <div class="app-name">BB Inventor <span>Pro</span></div>
  <div class="app-sub">Powered by Benny Bolognino</div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-label" id="progressLabel">Inizializzazione…</div>
  </div>
</div>

<div class="version">v2.0.0</div>
<button class="replay" onclick="replay()">↺ Riproduci animazione</button>

<script>
// ── Particelle ───────────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W, H;
const particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

for (let i = 0; i < 60; i++) {
  particles.push({
    x:  Math.random() * window.innerWidth,
    y:  Math.random() * window.innerHeight,
    r:  Math.random() * 1.5 + 0.3,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    a:  Math.random() * 0.45 + 0.08
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(29,185,84," + p.a + ")";
    ctx.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
  });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < 90) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = "rgba(29,185,84," + (0.06 * (1 - d / 90)) + ")";
        ctx.lineWidth   = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── Progress bar ─────────────────────────────────────────────
const bar   = document.getElementById("progressBar");
const label = document.getElementById("progressLabel");

const steps = [
  { pct: 15,  msg: "Caricamento impostazioni…",    delay: 500 },
  { pct: 35,  msg: "Inizializzazione database…",   delay: 600 },
  { pct: 60,  msg: "Preparazione interfaccia…",    delay: 500 },
  { pct: 80,  msg: "Connessione sorgente dati…",   delay: 700 },
  { pct: 95,  msg: "Quasi pronto…",                delay: 500 },
  { pct: 100, msg: "Pronto!",                      delay: 0   },
];

let timer = null;

function runSteps(idx) {
  if (idx >= steps.length) return;
  const s = steps[idx];
  bar.style.width   = s.pct + "%";
  label.textContent = s.msg;
  if (idx < steps.length - 1) {
    timer = setTimeout(() => runSteps(idx + 1), s.delay + Math.random() * 300);
  }
}

function replay() {
  clearTimeout(timer);
  // Reset animazioni CSS
  document.querySelectorAll(".logo-wrap,.app-name,.app-sub,.progress-wrap,.version,.replay").forEach(el => {
    el.style.animation = "none";
    el.style.opacity   = "0";
    void el.offsetWidth; // reflow
    el.style.animation = "";
    el.style.opacity   = "";
  });
  bar.style.width   = "0%";
  label.textContent = "Inizializzazione…";
  setTimeout(() => runSteps(0), 500);
}

// Avvio automatico
setTimeout(() => runSteps(0), 800);
</script>
</body>
</html>
